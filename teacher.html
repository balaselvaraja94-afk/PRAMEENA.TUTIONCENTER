<!DOCTYPE html>
<html>
<head>
    <title>Teacher Secure Portal</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="box">
        <h2>👨‍🏫 Teacher Login</h2>
        <p class="subtext">Access classroom management dashboard.</p>

        <!-- Admin & Teacher Inputs -->
        <input id="email" type="email" placeholder="Teacher Email">
        <input id="password" type="password" placeholder="Secure Password">

        <button id="loginBtn">Secure Login</button>
        <button id="registerBtn">Request Access (Register)</button>

        <div class="nav-links">
            <a href="index.html">← Back to Portal Selection</a>
        </div>
    </div>

    <!-- Load the app.js script as a module -->
    <script type="module" src="app.js"></script>

</body>

</html>
